<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello - Huan Chen</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-border: rgba(148, 163, 184, 0.24);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-2: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.26), transparent 34%),
        radial-gradient(circle at 80% 15%, rgba(56, 189, 248, 0.24), transparent 32%),
        linear-gradient(135deg, #020617 0%, var(--bg) 48%, #111827 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 24px;
    }

    main {
      width: min(100%, 680px);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0;
    }

    .status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 20px var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.5rem, 9vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .name {
      color: var(--accent-2);
    }

    .time-card {
      margin-top: 34px;
      padding: 22px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.45);
    }

    .label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #dateTime {
      margin: 0;
      font-size: clamp(1.35rem, 5vw, 2.25rem);
      font-weight: 700;
      line-height: 1.25;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.75;
      }

      50% {
        transform: scale(1.24);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">
      <span class="status" aria-hidden="true"></span>
      Current local date and time
    </div>

    <h1>Hello,<br>my name is <span class="name">Huan Chen</span>.</h1>

    <section class="time-card" aria-labelledby="time-label">
      <p class="label" id="time-label">Now</p>
      <p id="dateTime">Loading...</p>
    </section>
  </main>

  <script>
    const dateTime = document.querySelector("#dateTime");

    function updateDateTime() {
      const now = new Date();
      dateTime.textContent = new Intl.DateTimeFormat("en-US", {
        dateStyle: "full",
        timeStyle: "medium"
      }).format(now);
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>
</body>
</html>
